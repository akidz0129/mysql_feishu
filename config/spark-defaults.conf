
# ========== Spark 基础配置 ==========
spark.app.name                                              OrderDataProcessor



# 注意：
spark.driver.memory                                         2g
spark.executor.memory                                       2g
spark.executor.cores                                        1


spark.driver.extraJavaOptions           -Daws.region=us-east-1
spark.executor.extraJavaOptions         -Daws.region=us-east-1

# 启用 Spark SQL 扩展以支持 Iceberg
# spark.sql.extensions                                        org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions


# Spark SQL 通用设置
spark.sql.datetime.java8api.enabled                 true
spark.sql.session.timeZone                          UTC



# MinIO (S3A) 通用文件系统配置
# Spark 在读写 S3 兼容存储时会使用这些配置
# ============================================
spark.hadoop.fs.s3a.endpoint                                http://minio:9000
# 硬编码信息${MINIO_ROOT_USER}
spark.hadoop.fs.s3a.access.key                              admin 
# 硬编码信息${MINIO_ROOT_PASSWORD}
spark.hadoop.fs.s3a.secret.key                              Ji@oji123! 

spark.hadoop.fs.s3a.path.style.access                       true
spark.hadoop.fs.s3a.impl                                    org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled                  false
spark.hadoop.fs.s3a.aws.credentials.provider                org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider 
spark.hadoop.fs.s3a.region                                  us-east-1


